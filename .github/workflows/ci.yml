name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
      - name: Smoke-test CLI
        run: |
          python src/motion_library.py presets
          python src/motion_library.py preset fade-in --css
          python src/motion_library.py preset bounce --js
          python src/motion_library.py easing ease-out-back --steps 5
